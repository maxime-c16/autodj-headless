version: '3.9'

# Development docker-compose configuration for AutoDJ-Headless
# Key principle: Source code is bind-mounted, never baked into image
# Resource limits enforced per SPEC.md

services:
  autodj:
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
    container_name: autodj-dev
    image: autodj-base:v1.0

    # Interactive shell (allows exec commands)
    stdin_open: true
    tty: true

    # ==================== RESOURCE LIMITS (MANDATORY per SPEC.md) ====================
    cpus: '2'                      # 2 cores for dev (adjust for production)
    mem_limit: 6g                  # 6 GiB (increased from 3GB for liquidsoap buffering)
    mem_reservation: 2g            # Soft limit (increased from 512m)
    memswap_limit: 6g              # Match mem_limit
    pids_limit: 512                # Generous for dev

    # ==================== BIND MOUNTS (fast iteration, code never in image) ====================
    volumes:
      # Source code
      - ../src:/app/src:ro                    # Read-only (safety)
      # Scripts (quick_mix, nightly, etc.)
      - ../scripts:/app/scripts:ro            # Read-only (safety)
      # Tests
      - ../tests:/app/tests:ro                # Read-only (safety)
      # Configuration
      - ../configs:/app/configs:ro            # Read-only
      # Data volumes (read-write)
      - ../data/db:/app/data/db               # SQLite database
      - ../data/playlists:/app/data/playlists  # Generated playlists
      - ../data/mixes:/app/data/mixes         # Output mix files
      # Music library (read-only)
      - /srv/nas/shared:/srv/nas/shared:ro    # Music library mount

    # ==================== NETWORKING ====================
    # Loopback only (per workflow.md Rule: Network is busy)
    network_mode: bridge
    ports:
      # Expose only what's needed (Navidrome API assumed on host)
      - "127.0.0.1:8089:8080"  # Dev server port (8089 to avoid conflicts)

    # ==================== ENVIRONMENT ====================
    environment:
      # Python
      PYTHONUNBUFFERED: "1"        # Real-time logging
      PYTHONDONTWRITEBYTECODE: "1" # No __pycache__

      # AutoDJ
      AUTODJ_ENV: "development"
      AUTODJ_CONFIG_PATH: "/app/configs/autodj.toml"
      AUTODJ_LOG_DIR: "/app/data/logs"

      # Navidrome (adjust if running elsewhere)
      NAVIDROME_HOST: "192.168.1.57"  # Server IP
      NAVIDROME_PORT: "4533"
      NAVIDROME_API_PATH: "/rest"

      # Audio
      AUDIOREAD_FORMAT: "ffmpeg"

    # ==================== RESOURCE MONITORING ====================
    # Log limits for debugging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # ==================== WORKING DIRECTORY ====================
    working_dir: /app

    # ==================== SAFETY ====================
    # Don't run as root
    user: "1000:1000"

    # Drop unnecessary capabilities
    cap_drop:
      - NET_RAW
      - SYS_PTRACE

    # Read-only root filesystem (except /tmp, /run)
    read_only: false  # Need write access to /app/data

    # Restart policy: no auto-restart for interactive dev
    restart: "no"

# ==================== NAMED VOLUMES ====================
# Persist data across container restarts
volumes:
  autodj_db:
    driver: local
  autodj_playlists:
    driver: local
  autodj_mixes:
    driver: local

# ==================== NETWORK ====================
networks:
  default:
    name: autodj-dev
    driver: bridge
