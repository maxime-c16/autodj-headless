config_version = "1.0"

[mix]
target_duration_minutes = 45
max_playlist_tracks = 12
seed_track_path = ""

[constraints]
bpm_tolerance_percent = 15.0
energy_window_size = 3
min_track_duration_seconds = 120
max_track_duration_seconds = 1020
max_repeat_decay_hours = 168

[analysis]
aubio_hop_size = 512
aubio_buf_size = 4096
bpm_search_range = [50, 200]
confidence_threshold = 0.05

[key_detection]
method = "essentia"
window_size = 4096

[render]
output_format = "mp3"
mp3_bitrate = 320
crossfade_duration_seconds = 4.0
time_stretch_quality = "high"
enable_ladspa_eq = false

# DSP Enhancement Parameters (Phase 1 - Week 1)
# EQ Automation: Cut bass on outgoing, boost clarity on incoming
enable_eq_automation = true
eq_lowpass_frequency = 100    # Hz: Low-pass cutoff on outgoing track
eq_highpass_frequency = 50    # Hz: High-pass cutoff on incoming track

# Filter Sweeps (Phase 2 - experimental)
enable_filter_sweep = false
filter_sweep_duration = 4.0   # seconds

# Harmonic-Aware Transitions (Phase 2 - experimental)
enable_harmonic_transitions = false
crossfade_duration_short = 3.0  # For harmonically compatible tracks
crossfade_duration_long = 5.0   # For non-compatible tracks

# Tempo Ramping (Phase 2 - experimental)
enable_tempo_ramping = false

# Fade Curves
fade_type = "sin"              # sin/lin/exp (sine recommended for smooth audio)

# Memory & CPU
max_tracks_before_segment = 10
segment_size = 5
enable_progress_display = true
progress_update_interval = 1.0

[system]
library_path = "/music"
playlists_path = "data/playlists"
mixes_path = "data/mixes"
database_path = "data/db/metadata.sqlite"
log_level = "INFO"

[resources]
max_memory_mb = 256
max_cpu_cores = 0.5
max_analyze_time_sec = 30
max_generate_time_sec = 30
max_render_time_sec = 420

[navidrome]
host = "192.168.1.57"
port = 4533
api_path = "/rest"
username = ""
password = ""
connect_timeout_sec = 5

[discord]
enabled = true
token = "env:DISCORD_TOKEN"
channel_id = "env:DISCORD_CHANNEL_ID"
